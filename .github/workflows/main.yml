name: Pipeline CI/CD - Terraform / Ansible
on:
    workflow_dispatch:
jobs:
    cria-vm:
        name: Provisionamento de VMs
        runs-on: ubuntu-latest
        steps:
            - name: Setup Terraform
              uses: autero1/action-terraform@v3
              with:
                terraform-version: 1.15.5
            - name: Interact with Terraform
              run: terraform --version

            - name: Login to AWS with access keys
              uses: KoalaOps/login-aws@v1
              with:
                aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                aws_region: us-east-1
                enable_ecr_login: true 

            - name: Checkout Terraform Repo
              uses: actions/checkout@v6
              with:
                repository: danferreira011/pipeline-terraform-ansible-aws
                path: terraform
            
            - name: Terraform init
              run: |
                terraform init
            - name: Terraform Validate
              run: |
                terraform validate

            - name: Terraform Validate
              run: |
                terraform plan

