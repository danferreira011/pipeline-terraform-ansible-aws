---
- name: Install and configure Nginx
  hosts: webserver
  become: true

  tasks:
    - name: Update apt cache
      apt:
        update_cache: true

    - name: Install nginx
      apt:
        name: nginx
        state: present

    - name: Enable nginx service
      service:
        name: nginx
        enabled: true

    - name: Start nginx service
      service:
        name: nginx
        state: started
```
